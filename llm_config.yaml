default_provider: ark
providers:
  ark:
    description: 火山方舟 Ark 官方 API
    base_url: https://ark.cn-beijing.volces.com/api/plan/v3/chat/completions
    api_key: ''
    models:
      chat: deepseek-v4-flash
prd_parser:
  provider: ark
  model: deepseek-v4-flash
  temperature: 0.1
  max_retries: 3
  extraction:
    entity_confidence_threshold: 0.5
    mode: two_phase
    relation_confidence_threshold: 0.6
prd_generator:
  provider: ark
  model: deepseek-v4-flash
  temperature: 0.7
  max_tokens: 8192
  system_prompt_file: prd_samples/prd-writer/PROMPT.md
